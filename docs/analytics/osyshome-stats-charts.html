<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статистика osysHome</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        h1 { margin-bottom: 0.5rem; }
        .kpi { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; margin: 1.5rem 0; }
        .kpi-item { color: #fff; padding: 1rem; border-radius: 8px; text-align: center; }
        .kpi-val { font-size: clamp(1.15rem, 2.2vw, 1.75rem); font-weight: 700; line-height: 1.1; white-space: nowrap; font-variant-numeric: tabular-nums; }
        .kpi-label { font-size: 0.85rem; opacity: 0.9; }
        .charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; }
        .chart-wrap { background: #fff; padding: 1.25rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
        .chart-wrap-bar { min-height: 440px; }
        .chart-wrap h2 { font-size: 1rem; margin: 0 0 1rem; color: #333; }
        .error { color: #c00; }
        #map-container { width: 100%; height: 450px; margin: 2rem 0; background: #f5f5f5; border-radius: 8px; }
        .map-section { grid-column: 1 / -1; }
    </style>
</head>
<body>
    <h1>Статистика osysHome</h1>
    <div class="kpi">
        <div class="kpi-item" style="background:linear-gradient(135deg,#4CAF50,#45a049);">
            <div class="kpi-val" id="total">—</div>
            <div class="kpi-label">Установок</div>
        </div>
        <div class="kpi-item" style="background:linear-gradient(135deg,#2196F3,#1976D2);">
            <div class="kpi-val" id="objects">—</div>
            <div class="kpi-label">Объектов</div>
        </div>
        <div class="kpi-item" style="background:linear-gradient(135deg,#FF9800,#F57C00);">
            <div class="kpi-val" id="users">—</div>
            <div class="kpi-label">Пользователей</div>
        </div>
        <div class="kpi-item" style="background:linear-gradient(135deg,#009688,#00796B);">
            <div class="kpi-val" id="classes">—</div>
            <div class="kpi-label">Классов</div>
        </div>
        <div class="kpi-item" style="background:linear-gradient(135deg,#673AB7,#512DA8);">
            <div class="kpi-val" id="properties">—</div>
            <div class="kpi-label">Свойств</div>
        </div>
        <div class="kpi-item" style="background:linear-gradient(135deg,#3F51B5,#303F9F);">
            <div class="kpi-val" id="methods">—</div>
            <div class="kpi-label">Методов</div>
        </div>
        <div class="kpi-item" style="background:linear-gradient(135deg,#795548,#5D4037);">
            <div class="kpi-val" id="history">—</div>
            <div class="kpi-label">История</div>
        </div>
    </div>
    <div class="charts">
        <div class="chart-wrap map-section">
            <h2>География установок</h2>
            <div id="map-container"></div>
        </div>
        <div class="chart-wrap"><h2>По странам</h2><canvas id="chart-country" height="220"></canvas></div>
        <div class="chart-wrap"><h2>По версиям</h2><canvas id="chart-version" height="220"></canvas></div>
        <div class="chart-wrap chart-wrap-bar"><h2>По модулям</h2><canvas id="chart-integration" height="440"></canvas></div>
        <div class="chart-wrap"><h2>Тип установки</h2><canvas id="chart-installation" height="220"></canvas></div>
        <div class="chart-wrap"><h2>ОС</h2><canvas id="chart-os" height="220"></canvas></div>
        <div class="chart-wrap"><h2>Ветка обновлений</h2><canvas id="chart-branch" height="220"></canvas></div>
    </div>
    <p id="error" class="error" style="display:none;"></p>
    <script>
        const API_URL = 'https://osyshome.ru/wp-json/osyshome/v1/stats';
        const colors = ['#4CAF50','#2196F3','#FF9800','#9C27B0','#F44336','#00BCD4','#795548','#607D8B'];
        function makePie(id, labels, values) {
            const ctx = document.getElementById(id);
            if (!ctx || !labels.length) return;
            new Chart(ctx, { type: 'pie', data: { labels, datasets: [{ data: values, backgroundColor: colors }] }, options: { responsive: true, plugins: { legend: { position: 'right' } } } });
        }
        function makeBar(id, labels, values, barOptions) {
            const ctx = document.getElementById(id);
            if (!ctx || !labels.length) return;
            const opts = { indexAxis: 'y', responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } }, layout: { padding: { left: 2, right: 10 } }, scales: { x: { beginAtZero: true, ticks: { stepSize: 1 } }, y: { ticks: { autoSkip: false, font: { size: 10 }, maxRotation: 0 } } } };
            Object.assign(opts, barOptions || {});
            new Chart(ctx, { type: 'bar', data: { labels, datasets: [{ data: values, backgroundColor: colors[0], borderRadius: 4 }] }, options: opts });
        }
        function initMap(data) {
            const container = document.getElementById('map-container');
            if (!container || (!(data.map_countries || []).length && !(data.by_city || []).length)) return;
            const chart = echarts.init(container);
            const MAP_URL = 'https://cdn.jsdelivr.net/gh/nvkelso/natural-earth-vector@master/geojson/ne_110m_admin_0_countries.geojson';
            Promise.all([ fetch(MAP_URL).then(r => r.json()) ]).then(([geo]) => {
                (geo.features || []).forEach(f => {
                    if (f.properties) {
                        const n = f.properties.NAME || f.properties.name || '';
                        const alias = {'Russian Federation':'Russia','The Netherlands':'Netherlands','United States of America':'United States','United Kingdom':'United Kingdom','Czech Republic':'Czech Republic'}[n] || n;
                        f.properties.name = alias;
                    }
                });
                echarts.registerMap('world', geo);
                const mapData = data.map_countries || [];
                const cities = (data.by_city || []).map(x => ({
                    name: x.city + (x.country_name ? ', ' + x.country_name : ''),
                    value: [x.lon, x.lat, x.count]
                }));
                const series = [];
                if (mapData.length) {
                    series.push({
                        type: 'map',
                        map: 'world',
                        geoIndex: 0,
                        roam: true,
                        data: mapData,
                        emphasis: { label: { show: true }, itemStyle: { areaColor: '#ffd700' } },
                        itemStyle: { areaColor: '#e0e0e0', borderColor: '#90a4ae' }
                    });
                }
                if (cities.length) {
                    series.push({
                        type: 'effectScatter',
                        coordinateSystem: 'geo',
                        data: cities,
                        symbolSize: function(val) { return Math.max(8, Math.min(30, Math.sqrt(val[2]) * 4)); },
                        showEffectOn: 'render',
                        rippleEffect: { scale: 2.5, brushType: 'stroke' },
                        label: { show: false },
                        itemStyle: { color: '#f44336', shadowBlur: 10, shadowColor: 'rgba(244,67,54,0.5)' }
                    });
                }
                const opt = {
                    tooltip: { trigger: 'item', formatter: p => {
                        if (p.seriesType === 'map') return p.name + ': ' + (p.value || 0) + ' установок';
                        if (p.value && p.value[2] != null) return p.name + ': ' + p.value[2] + ' установок';
                        return p.name;
                    }},
                    visualMap: mapData.length ? {
                        min: 0,
                        max: Math.max(...mapData.map(d => d.value), 1),
                        text: ['Много', 'Мало'],
                        inRange: { color: ['#e3f2fd', '#1976d2', '#0d47a1'] },
                        left: 'left',
                        bottom: 20
                    } : null,
                    geo: { map: 'world', roam: true, silent: false, itemStyle: { areaColor: '#e0e0e0', borderColor: '#90a4ae' } },
                    series: series
                };
                chart.setOption(opt);
            }).catch(() => {});
        }

        fetch(API_URL, { credentials: 'include' }).then(r => r.json()).then(data => {
            document.getElementById('total').textContent = data.installations || 0;
            document.getElementById('objects').textContent = (data.total_objects || 0).toLocaleString();
            document.getElementById('users').textContent = (data.total_users || 0).toLocaleString();
            document.getElementById('classes').textContent = (data.total_classes || 0).toLocaleString();
            document.getElementById('properties').textContent = (data.total_properties || 0).toLocaleString();
            document.getElementById('methods').textContent = (data.total_methods || 0).toLocaleString();
            document.getElementById('history').textContent = (data.total_history || 0).toLocaleString();
            initMap(data);
            const c = Object.keys(data.by_country || {}), cv = c.map(k => data.by_country[k]);
            const v = Object.keys(data.by_version || {}), vv = v.map(k => data.by_version[k]);
            const i = Object.keys(data.by_integration || {}), iv = i.map(k => data.by_integration[k]);
            const t = Object.keys(data.by_installation_type || {}), tv = t.map(k => data.by_installation_type[k]);
            const o = Object.keys(data.by_os || {}), ov = o.map(k => data.by_os[k]);
            const b = Object.keys(data.by_core_branch || {}), bv = b.map(k => data.by_core_branch[k]);
            makePie('chart-country', c, cv);
            makePie('chart-version', v, vv);
            makeBar('chart-integration', i.slice(0, 20), iv.slice(0, 20));
            makePie('chart-installation', t, tv);
            makePie('chart-os', o, ov);
            makePie('chart-branch', b, bv);
        }).catch(err => { document.getElementById('error').textContent = 'Ошибка: ' + err.message; document.getElementById('error').style.display = 'block'; });
    </script>
</body>
</html>
