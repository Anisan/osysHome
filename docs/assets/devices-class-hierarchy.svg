<svg xmlns="http://www.w3.org/2000/svg" width="2300" height="560" viewBox="0 0 2300 560" role="img" aria-labelledby="title desc">
  <title id="title">osysHome Devices class hierarchy</title>
  <desc id="desc">Hierarchy of classes under the root class Devices in osysHome.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
