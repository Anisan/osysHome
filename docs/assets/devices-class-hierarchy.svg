      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; ry: 18; }
      .root { fill: #dbeafe; stroke: #60a5fa; }
      .mid { fill: #f8fafc; stroke: #94a3b8; }
      .label { font: 600 20px 'Segoe UI', Arial, sans-serif; fill: #0f172a; text-anchor: middle; dominant-baseline: middle; }
      .small { font: 600 15px 'Segoe UI', Arial, sans-serif; fill: #0f172a; text-anchor: middle; dominant-baseline: middle; }
      .tiny { font: 400 14px 'Segoe UI', Arial, sans-serif; fill: #64748b; text-anchor: middle; }
      .line { stroke: #94a3b8; stroke-width: 3; fill: none; stroke-linecap: round; }
    </style>
  </defs>

