# Рабочая конфигурация osysHome  
# Этот файл создается пользователем на основе sample_config.yaml  
  
application:  
  # Язык интерфейса по умолчанию (например: en, ru, de)
  default_language: 'en'  
  # Часовой пояс по умолчанию для отображения дат/времени
  default_timezone: 'Europe/Moscow'
  # Секретный ключ Flask для сессий и токенов — ОБЯЗАТЕЛЬНО смените в рабочей среде
  secret_key: 'your-secret-key-here'  
  # Режим отладки (True для разработки, False для продакшена)
  debug: false  
  # Порт HTTP, на котором будет слушать osysHome
  app_port: 5000  
  # Имя окружения (production / development и т.п.), используется в логике приложения
  env: 'production'
  pool_size: 20
  pool_max_size: 100
  pool_timeout_threshold: 60.0
  batch_writer_flush_interval: 0.5
  session_lifetime_days: 31  # Время жизни сессии в днях (по умолчанию 31 день, как в Flask)
  http_request_timeout: 15   # Таймаут HTTP-запросов (секунды), по умолчанию 15
  # Cookie безопасности (включаются автоматически при debug: false)
  session_cookie_secure: false   # Требовать HTTPS для cookie (production)
  session_cookie_samesite: 'Lax' # Защита от CSRF
  # Rate limiting — защита от brute-force и DoS
  rate_limit:
    enabled: true
    default: '100 per minute'  # Общий лимит для всех маршрутов
    login: '5 per minute'      # Строгий лимит для /login
    api: '100 per minute'      # Лимит для API (использует default при отсутствии)
  
database:  
  # Включить вывод SQL‑запросов в лог (удобно для отладки, выключайте в продакшене)
  sqlalchemy_echo: false  
  # Размер пула соединений SQLAlchemy
  pool_size: 20
  # Имя файла БД SQLite. Файл создаётся в корне проекта, если connection_string не задан.
  db_name: 'app.db'  
  # Для SQLite используется db_name.  
  # Для PostgreSQL/MySQL раскомментируйте и настройте одну из строк ниже.
  # Пример PostgreSQL:
  # connection_string: 'postgresql://osyshome:password@localhost/osyshome'  
  # Пример MySQL:
  # connection_string: 'mysql://osyshome:password@localhost/app'
  
cache:  
  # Путь к каталогу файлового кеша (если используется файловый backend)
  file_path: 'cache'  
  # Тип кеша: 'simple' (по умолчанию, in‑memory), либо другой поддерживаемый backend
  type: 'simple'
  # Время жизни записей кеша в секундах
  timeout: 300
  
service:  
  autorestart: False  
  name: null # Или имя сервиса 'osyshome'  
