# Working osysHome configuration
# Copy this file to config.yaml and adjust settings before production use.
#
# SECURITY CHECKLIST (required before exposing the instance to a network / internet):
#   1. secret_key       — MUST be a unique random string (never leave the sample value).
#   2. debug            — MUST be false in production.
#   3. session_cookie_secure — SHOULD be true when HTTPS / reverse proxy with TLS is used.
#   4. Admin password   — set a strong password on first login (first visit creates admin).
#   5. Network          — do not port-forward to the internet without TLS and a strong secret_key.
#   6. Guest accounts   — role "user" is trusted; only create if you understand API access.
#   7. HTTPS deploy     — see deploy/README.md (nginx + systemd + Let's Encrypt).
#
# SQL API (/api/sql/*) is admin-only by default. Other roles can be allowed per-endpoint
# in the Permissions plugin (_permissions.api:select_query etc.).
#
# AUTO-CONFIG: On first start, if secret_key is still the sample value below, osysHome
# generates a random secret_key, applies recommended security settings, and updates
# config.yaml in place (your comments in this file are preserved). After you set
# secret_key manually, auto-config never runs again.

application:
  # Default UI language.
  # Examples: 'en', 'ru', 'de'.
  default_language: 'en'

  # Default timezone for displaying dates and times.
  # Use an IANA timezone name such as 'Europe/Moscow'.
  default_timezone: 'Europe/Moscow'

  # Flask secret key used for sessions and CSRF tokens.
  # REQUIRED: generate a unique value before any real deployment, e.g.:
  #   python -c "import secrets; print(secrets.token_hex(32))"
  # Leaving the sample value allows session forgery.
  secret_key: 'your-secret-key-here'  # CHANGE ME — mandatory

  # Global application debug mode.
  # REQUIRED: false in production (exposes internals, disables safe defaults).
  debug: false

  # HTTP port used by the application.
  app_port: 5000

  # Application environment name.
  # Common values are 'production' and 'development'.
  env: 'production'

  # Base size of the internal worker thread pool.
  # Affects concurrent background task processing.
  pool_size: 20

  # Maximum size of the worker thread pool.
  # If null, the application uses its internal default behavior.
  pool_max_size: 100

  # Threshold in seconds after which a pool task is considered slow.
  pool_timeout_threshold: 60.0

  # Forced flush interval for batched writes, in seconds.
  # Lower values write data sooner but increase write frequency.
  batch_writer_flush_interval: 0.5

  # Reactive property->method chain: max depth and admin notify on loop.
  reactive_max_depth: 20
  reactive_loop_notify: true

  # Background preload of all objects after startup (lazy onInit without blocking boot).
  object_preload_enabled: true
  object_preload_batch_size: 10
  object_preload_interval_sec: 0.5

  # User session lifetime in days.
  # Default is 31 days, matching Flask's default behavior.
  session_lifetime_days: 31

  # Timeout for outbound HTTP requests in seconds.
  # Used as the default timeout for requests.get/post and similar calls.
  http_request_timeout: 15

  # Require HTTPS for the session cookie (Set-Cookie Secure flag).
  # REQUIRED when the UI is served over HTTPS (reverse proxy, TLS termination).
  # Can stay false only for pure HTTP on a trusted local network.
  session_cookie_secure: false  # set true behind HTTPS

  # SameSite policy for the session cookie.
  # 'Lax' is a good default for most deployments.
  session_cookie_samesite: 'Lax'

  # Rate limiting to protect against brute-force attempts and overload.
  rate_limit:
    # Enable or disable rate limiting globally.
    enabled: true

    # Default rate limit for all routes.
    default: '100 per minute'

    # Dedicated rate limit for the login page.
    login: '5 per minute'

    # Rate limit for API routes.
    # Used when no more specific API limit is configured elsewhere.
    api: '100 per minute'

database:
  # Print SQL statements to the log.
  # Useful for SQL debugging, but noisy and slower in production.
  sqlalchemy_echo: false

  # SQLAlchemy connection pool size.
  # Most relevant for PostgreSQL and MySQL/MariaDB.
  pool_size: 20

  # SQLite database filename.
  # Used only when connection_string is not set.
  db_name: 'app.db'

  # External database connection string.
  # Usually not needed for SQLite, where db_name is used instead.
  # PostgreSQL example:
  # connection_string: 'postgresql://osyshome:password@localhost/osyshome'
  # MySQL example:
  # connection_string: 'mysql://osyshome:password@localhost/app'

debug_tools:
  # Enable extra heavy debugging tools.
  # These are usually kept disabled even when application.debug is true.
  enabled: false

  # Enable the template editor inside Flask Debug Toolbar.
  # Rarely needed in normal development.
  template_editor_enabled: false

  # Enable request profiling in Debug Toolbar.
  # This can noticeably slow page rendering.
  profiler_enabled: false

  # Output filename used by the profiler.
  profiler_dump_filename: 'dump.prof'

  # Intercept HTTP redirects in Debug Toolbar instead of following them normally.
  intercept_redirects: false

  # Collect SQL query statistics for each HTTP request.
  # Useful for investigating slow pages, but adds overhead.
  sqlalchemy_record_queries: false

cache:
  # Path to the cache directory.
  # Used by file-based cache backends.
  file_path: 'cache'

  # Cache backend type.
  # 'simple' stores data in process memory.
  type: 'simple'

  # Cache entry lifetime in seconds.
  timeout: 300

service:
  # Allow automatic restart handling through built-in restart actions.
  autorestart: False

  # systemd service name for service management.
  # Leave null if systemd is not used.
  name: null

  # Docker container name for restart management through Docker.
  # Leave null if the application is not running in a container.
  docker_container: null
