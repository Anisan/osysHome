<!-- Then put toasts within -->
<!-- Контейнеры для разных позиций будут созданы автоматически через JavaScript -->  
<div class="toast-container position-absolute top-0 end-0 p-3">  
  <!-- Здесь будут отображаться уведомления -->  
</div>

<div id="overlay" class="overlay">
  <div class="spinner-container">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
    <div class="overlay-text">
      Loading...
    </div>
  </div>
</div>

<style>
  .overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.3);
    z-index: 9999;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }

  .spinner-container {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .spinner-border {
    width: 7rem;
    height: 7rem;
  }

  .overlay-text {
    position: absolute;
    color: white;
    font-size: 1rem;
  }
</style>

<script src="{{ config.ASSETS_ROOT }}/plugins/socket.io/socket.io.js"></script>
<script src="{{ config.ASSETS_ROOT }}/plugins/morphdom/morphdom.js"></script>
<script>
  var socket = io.connect(window.location.protocol + '//' + document.domain + ':' + location.port);
  var hasConnectedOnce = false;

  function sendCurrentPage() {
    try {
      var page = window.location.pathname + window.location.search + window.location.hash;
      socket.emit('page', page);
    } catch (e) {
      console.warn('Failed to send current page via websocket', e);
    }
  }

  socket.on('connect', function () {
    console.log('Connected to server');
    document.getElementById('overlay').style.display = 'none';

    // Если это повторное подключение после разрыва — перезагружаем страницу
    if (hasConnectedOnce) {
      window.location.reload();
      return;
    }

    hasConnectedOnce = true;
    subscribe();
    sendCurrentPage();
  });

  socket.on('disconnect', function () {
    console.log('Disconnected from server');
    document.getElementById('overlay').style.display = 'flex';
  });

  socket.on('message', function (msg) {
    var messages = document.getElementById('messages');
    var message = document.createElement('div');
    message.textContent = msg;
    messages.appendChild(message);
  });

  function coerceBool(v) {
    if (typeof v === 'boolean') return v;
    if (typeof v === 'number') return v !== 0;
    if (typeof v === 'string') {
      var s = v.trim().toLowerCase();
      if (s === 'true' || s === '1' || s === 'yes' || s === 'on') return true;
      if (s === 'false' || s === '0' || s === 'no' || s === 'off' || s === '') return false;
    }
    return !!v;
  }

  function valueToString(v) {
    if (v === null || v === undefined) return '';
    if (typeof v === 'object') {
      try { return JSON.stringify(v); } catch (e) { return String(v); }
    }
    return String(v);
  }

  // Cache for data-prop-attr-* bindings (rebuilt during subscribe())
  var __propAttrBindings = [];
  // Track subscriptions owned by this script only.
  var __subscribedProperties = new Set();
  var __subscribedObjects = new Set();
  var __subscriptionRefreshTimer = null;
  function rebuildPropAttrBindings() {
    __propAttrBindings = [];
    var nodes = document.querySelectorAll('*');
    if (!nodes || nodes.length === 0) return;

    nodes.forEach(function (node) {
      if (!node || !node.attributes) return;
      Array.from(node.attributes).forEach(function (attr) {
        if (!attr || !attr.name) return;
        if (attr.name.indexOf('data-prop-attr-') !== 0) return;

        var targetAttrName = attr.name.slice('data-prop-attr-'.length);
        var propertyName = (attr.value || '').trim();
        if (!targetAttrName || !propertyName) return;

        __propAttrBindings.push({
          node: node,
          targetAttrName: targetAttrName,
          propertyName: propertyName
        });
      });
    });
  }

  function applyPropDisplayBindings(propertyName, value) {
    var nodes = document.querySelectorAll('[data-prop-display="' + propertyName + '"]');
    if (!nodes || nodes.length === 0) return;

    var isTrue = coerceBool(value);
    nodes.forEach(function (node) {
      // default: block/none, can be overridden per element
      var showDisplay = node.getAttribute('data-prop-display-true') || 'block';
      var hideDisplay = node.getAttribute('data-prop-display-false') || 'none';
      node.style.display = isTrue ? showDisplay : hideDisplay;
    });
  }

  function applyPropTextBindings(propertyName, value) {
    var nodes = document.querySelectorAll('[data-prop-text="' + propertyName + '"]');
    if (!nodes || nodes.length === 0) return;
    var str = valueToString(value);
    nodes.forEach(function (node) {
      node.textContent = str;
    });
  }

  function applyPropValueBindings(propertyName, value) {
    var nodes = document.querySelectorAll('[data-prop-value="' + propertyName + '"]');
    if (!nodes || nodes.length === 0) return;
    var str = valueToString(value);
    nodes.forEach(function (node) {
      // value is a property for form controls
      if ('value' in node) node.value = str;
      else node.setAttribute('value', str);
    });
  }

  function applyPropCheckedBindings(propertyName, value) {
    var nodes = document.querySelectorAll('[data-prop-checked="' + propertyName + '"]');
    if (!nodes || nodes.length === 0) return;
    var b = coerceBool(value);
    nodes.forEach(function (node) {
      if ('checked' in node) node.checked = b;
      else node.setAttribute('aria-checked', b ? 'true' : 'false');
    });
  }

  function applyPropAttrBindings(propertyName, value) {
    // Usage: data-prop-attr-title="Some.Prop" => sets title="value"
    // Also works for any attr name: data-prop-attr-href, data-prop-attr-src, data-prop-attr-aria-label, etc.
    var str = valueToString(value);
    if (!__propAttrBindings || __propAttrBindings.length === 0) return;

    __propAttrBindings.forEach(function (b) {
      if (!b || b.propertyName !== propertyName) return;
      if (!b.node || !b.node.setAttribute) return;
      if (b.node.isConnected === false) return;
      b.node.setAttribute(b.targetAttrName, str);
    });
  }

  function scheduleSubscriptionRefresh() {
    if (__subscriptionRefreshTimer) {
      clearTimeout(__subscriptionRefreshTimer);
    }
    __subscriptionRefreshTimer = setTimeout(function() {
      subscribe(false);
    }, 150);
  }

  socket.on('changeProperty', function (msg) {
    var elements = document.querySelectorAll(`[id^="prop:${msg.property}"]`);
    elements.forEach(element => {
      if (element.id === `prop:${msg.property}`)
        element.textContent = typeof msg.value === "object" ? JSON.stringify(msg.value) : msg.value;
    });

    // Bind property value to element visibility (optional)
    applyPropDisplayBindings(msg.property, msg.value);
    // Bind property value to other targets (optional)
    applyPropTextBindings(msg.property, msg.value);
    applyPropValueBindings(msg.property, msg.value);
    applyPropCheckedBindings(msg.property, msg.value);
    applyPropAttrBindings(msg.property, msg.value);

    elements = document.querySelectorAll(`[id^="prop_changed:${msg.property}"]`);
    elements.forEach(element => {
      if (element.id === `prop_changed:${msg.property}`)
        element.textContent = msg.changed;
    });
    elements = document.querySelectorAll(`[id^="prop_source:${msg.property}"]`);
    elements.forEach(element => {
      if (element.id === `prop_source:${msg.property}`)
        element.textContent = msg.source;
    });
  });
  socket.on('executedMethod', function (msg) {
    var elements = document.querySelectorAll(`[id^="method_source:${msg.method}"]`);
    elements.forEach(element => {
      if (element.id === `method_source:${msg.method}`)
        element.textContent = msg.source;
    });
    elements = document.querySelectorAll(`[id^="method_executed:${msg.method}"]`);
    elements.forEach(element => {
      if (element.id === `method_executed:${msg.method}`)
        element.textContent = msg.executed;
    });
    elements = document.querySelectorAll(`[id^="method_exec_params:${msg.method}"]`);
    elements.forEach(element => {
      if (element.id === `method_exec_params:${msg.method}`)
        element.textContent = msg.exec_params;
    });
    elements = document.querySelectorAll(`[id^="method_exec_result:${msg.method}"]`);
    elements.forEach(element => {
      if (element.id === `method_exec_result:${msg.method}`)
        element.textContent = msg.exec_result;
    });
    elements = document.querySelectorAll(`[id^="method_exec_time:${msg.method}"]`);
    elements.forEach(element => {
      if (element.id === `method_exec_time:${msg.method}`)
        element.textContent = msg.exec_time;
    });
  });
  socket.on('changeObject', function (msg) {
    console.log("change objects", msg)
    var element = document.getElementById("obj:" + msg.object);
    if (element) {
      // Сохраняем открытые модалки ВНУТРИ этого объекта:
      // если объект перерендерится, модалка может исчезнуть из DOM, но мы хотим оставить ее открытой.
      // Решение: временно переносим открытую модалку в <body>, а после закрытия возвращаем в объект (если есть место).
      var detachedOpenModals = [];
      var detachedModalIds = [];
      try {
        element.querySelectorAll('.modal.show').forEach(function(modalEl) {
          // Нужен id, чтобы вернуть обратно более-менее предсказуемо
          if (!modalEl.id) return;

          var placeholder = document.createElement('div');
          placeholder.setAttribute('data-modal-placeholder', modalEl.id);

          // Вставляем плейсхолдер на место модалки и вынимаем модалку
          if (modalEl.parentNode) {
            modalEl.parentNode.insertBefore(placeholder, modalEl);
            modalEl.parentNode.removeChild(modalEl);
          } else {
            return;
          }

          // Переносим модалку в body, чтобы обновление объекта ее не трогало
          document.body.appendChild(modalEl);

          // На всякий случай помечаем владельца
          modalEl.setAttribute('data-modal-owner', element.id);

          // Когда модалка закроется — попытаемся вернуть ее обратно в объект
          var onHidden = function() {
            modalEl.removeEventListener('hidden.bs.modal', onHidden);

            // Ищем плейсхолдер в актуальном DOM объекта (после обновления)
            var ownerEl = document.getElementById(element.id);
            var newPlaceholder = ownerEl ? ownerEl.querySelector('[data-modal-placeholder=\"' + modalEl.id + '\"]') : null;

            if (newPlaceholder && newPlaceholder.parentNode) {
              newPlaceholder.parentNode.insertBefore(modalEl, newPlaceholder);
              newPlaceholder.parentNode.removeChild(newPlaceholder);
            } else {
              // Если плейсхолдера нет (шаблон изменился) — просто удаляем модалку из DOM
              // (иначе будет "висячая" разметка в body)
              if (modalEl.parentNode) {
                modalEl.parentNode.removeChild(modalEl);
              }
            }
          };
          modalEl.addEventListener('hidden.bs.modal', onHidden);

          detachedOpenModals.push({ id: modalEl.id });
          detachedModalIds.push(modalEl.id);
        });
      } catch (e) {
        console.warn('Error detaching open modals:', e);
      }
      
      // Важно: нельзя "клонить и заменять" содержимое (element.innerHTML = ...),
      // иначе теряется идентичность DOM-узлов и браузер закрывает нативные UI (например color picker).
      // Обновляем DOM IN-PLACE и только дочерние узлы (childrenOnly), сохраняя wrapper `#obj:...`.
      var wrapper = document.createElement(element.tagName);
      wrapper.innerHTML = msg.value;

      // Если пользователь сейчас взаимодействует с контролом внутри объекта (focus),
      // не обновляем этот контрол, чтобы не закрывать popover/picker и не сбрасывать ввод.
      var activeEl = document.activeElement;
      var activeElIsInside = activeEl && element.contains(activeEl);

      // Собираем скрипты, которые нужно выполнить после обновления
      var scriptsToExecute = [];

      // Выполняем морфинг содержимого напрямую в element
      morphdom(element, wrapper, {
        childrenOnly: true,
        // Сохраняем скрипты и не пересоздаем их, если они не изменились
        onBeforeElUpdated: function(fromEl, toEl) {
          // Для time-component сохраняем существующий DOM-узел,
          // чтобы избежать мерцания при частых websocket-обновлениях.
          if (fromEl.classList && toEl.classList &&
              fromEl.classList.contains('time-component') &&
              toEl.classList.contains('time-component')) {
            var nextStartTime = toEl.getAttribute('data-start-time');
            if (nextStartTime !== null && fromEl.getAttribute('data-start-time') !== nextStartTime) {
              fromEl.setAttribute('data-start-time', nextStartTime);
            }
            return false;
          }

          // Универсальное сохранение display для помеченных элементов
          // добавить в элемент data-preserve-display="true"
          if (fromEl.hasAttribute && fromEl.hasAttribute('data-preserve-display')) {
            var disp = fromEl.style.display;
            if (disp) {
              toEl.style.display = disp;
            }
          }
          // Не трогаем активный инпут/селект/текстареа внутри объекта (иначе закрывается color picker и т.п.)
          if (activeElIsInside && fromEl === activeEl) {
            var tag = (fromEl.tagName || '').toUpperCase();
            if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') {
              return false;
            }
          }

          // Если в объекте есть "детачнутая" открытая модалка, то в новом HTML
          // появится ее копия с тем же id. Это создаёт дубли id (modal/input) и ломает обработчики.
          // Не даём morphdom заменять плейсхолдер на новую разметку модалки.
          if (detachedModalIds.length > 0) {
            var placeholderId = (fromEl.getAttribute && fromEl.getAttribute('data-modal-placeholder')) || null;
            if (placeholderId && detachedModalIds.indexOf(placeholderId) !== -1) {
              // Оставляем плейсхолдер как есть
              return false;
            }
            // Если попытка обновить/заменить элемент с id детачнутой модалки — пропускаем
            if (toEl && toEl.id && detachedModalIds.indexOf(toEl.id) !== -1) {
              return false;
            }
          }

          // Если это script тег, проверяем, изменился ли он
          if (fromEl.tagName === 'SCRIPT' && toEl.tagName === 'SCRIPT') {
            var fromSrc = fromEl.src || '';
            var toSrc = toEl.src || '';
            var fromContent = (fromEl.textContent || fromEl.innerHTML || '').trim();
            var toContent = (toEl.textContent || toEl.innerHTML || '').trim();
            
            // Если скрипт не изменился, не обновляем его (сохраняем выполненное состояние)
            if (fromSrc === toSrc && fromContent === toContent) {
              return false;
            }
            // Если скрипт изменился, нужно его заменить и выполнить
            scriptsToExecute.push({
              src: toSrc,
              content: toContent,
              attributes: Array.from(toEl.attributes).reduce(function(acc, attr) {
                acc[attr.name] = attr.value;
                return acc;
              }, {})
            });
            return true;
          }
          return true; // Обновляем все остальные элементы
        },
        onBeforeNodeAdded: function(node) {
          // Не добавляем в объект новую копию открытой (детачнутой) модалки
          if (detachedModalIds.length > 0 && node && node.id && detachedModalIds.indexOf(node.id) !== -1) {
            return false;
          }
          return true;
        },
        onNodeAdded: function(node) {
          // Собираем новые скрипты для выполнения
          if (node.tagName === 'SCRIPT') {
            var src = node.src || '';
            var content = (node.textContent || node.innerHTML || '').trim();
            scriptsToExecute.push({
              src: src,
              content: content,
              attributes: Array.from(node.attributes).reduce(function(acc, attr) {
                acc[attr.name] = attr.value;
                return acc;
              }, {})
            });
          }
        }
      });
      
      // Проверка после обновления: если остался backdrop без открытых модальных окон - удаляем его
      // Это предотвращает проблему "зависшего" backdrop, если модальное окно было удалено из DOM
      setTimeout(function() {
        var openModals = document.querySelectorAll('.modal.show');
        var backdrops = document.querySelectorAll('.modal-backdrop');
        
        // Если есть backdrop, но нет открытых модальных окон - удаляем backdrop
        if (backdrops.length > 0 && openModals.length === 0) {
          backdrops.forEach(function(backdrop) {
            backdrop.remove();
          });
          document.body.classList.remove('modal-open');
          document.body.style.overflow = '';
          document.body.style.paddingRight = '';
        }
      }, 100);
      
      // Выполняем новые или измененные скрипты
      // Важно: скрипты, добавленные через innerHTML, не выполняются автоматически
      scriptsToExecute.forEach(function(scriptInfo) {
        // Удаляем старые скрипты с таким же содержимым, если они есть
        var existingScripts = element.querySelectorAll('script');
        existingScripts.forEach(function(oldScript) {
          var oldSrc = oldScript.src || '';
          var oldContent = (oldScript.textContent || oldScript.innerHTML || '').trim();
          if ((scriptInfo.src && oldSrc === scriptInfo.src) || 
              (!scriptInfo.src && oldContent === scriptInfo.content)) {
            oldScript.parentNode.removeChild(oldScript);
          }
        });
        
        // Создаем и выполняем новый скрипт
        var script = document.createElement('script');
        // Копируем все атрибуты
        Object.keys(scriptInfo.attributes).forEach(function(attrName) {
          if (attrName.toLowerCase() !== 'src') {
            script.setAttribute(attrName, scriptInfo.attributes[attrName]);
          }
        });
        
        if (scriptInfo.src) {
          script.src = scriptInfo.src;
        } else if (scriptInfo.content) {
          script.textContent = scriptInfo.content;
        }
        
        // Добавляем скрипт в элемент для выполнения браузером
        element.appendChild(script);
      });
    }
    else {
      console.log("not found object");
      // The object node can appear a bit later on dynamic pages.
      scheduleSubscriptionRefresh();
    }
  });

  function formatTime(number) {
    return number < 10 ? '0' + number : number;
  }

  // Функция для отображения уведомлений
  // Заменить функцию showNotification на:  
  function showNotification(data, options) {
    if (typeof notificationManager !== 'undefined' && notificationManager) {
      notificationManager.show(data, options || {});
    }
  }

  // Обработка события при получении уведомления от сервера 
  socket.on('say', function (data) {
    console.log("SAY", data);

    var ext = data.args || {}

    const options = {
      groupKey: ext.source || null,
      sound: ext.sound || ext.level === 'error' || ext.level === 'warning',
      persistent: ext.persistent || ext.level === 'error',
      actions: []
    };

    if (ext.source) {
      options.actions.push({
        id: 'view_logs',
        label: 'Open',
        callback: (notifId, actionId) => {
          window.open(`/admin/${ext.source}`, '_blank');
        }
      });
    }

    notificationManager.show({
      level: ext.level || 'info',
      message: data.message,
      title: ext.title || 'Системное уведомление'
    }, options);
  });

  socket.on('playsound', function (data) {
    console.log("playsound", data);
    if (typeof playSound === 'function') {  
      playSound(data.file_url);  
    }  
  });

  function restart_system() {
    socket.emit('restart_system');
  }

  function setProperty(name, value) {
    socket.emit('setProperty', name, value);
  }

  function callMethod(name) {
    socket.emit('callMethod', name);
  }

  function callMethodWithResult(name) {
    socket.emit('callMethod', name, "WS", true);
  }

  // Функция для обновления блока уведомлений (использует централизованный менеджер)
  function refreshNotifyBlockIfAvailable(source) {
    // Используем централизованный менеджер уведомлений
    if (typeof NotificationSystem !== 'undefined' && NotificationSystem.isInitialized) {
      if (NotificationSystem.isOnModulePage(source)) {
        NotificationSystem.refreshNotifyBlock(source);
        return true;
      }
    }
    return false;
  }

  // Обработка событий уведомлений
  socket.on('notify', function (data) {
    console.log("notify recv", data)
    if (!data || !data.operation || !data.data) return;
    
    if (data.operation === 'new_notify') {
      const notifyData = data.data;
      const notifySource = notifyData.source;
      
      // Показываем всплывающее уведомление
      if (typeof showNotification === 'function') {
        // Преобразуем category (число) в уровень для уведомления
        const categoryMap = {
          0: 'debug',    // Debug
          1: 'info',     // Info
          2: 'warning',  // Warning
          3: 'error',    // Error
          4: 'error'     // Fatal -> error
        };
        const category = notifyData.category !== undefined ? notifyData.category : 1;
        const level = categoryMap[category] || 'info';
        
        // Формируем сообщение
        let message = notifyData.name || '';
        if (notifyData.description) {
          message += (message ? ': ' : '') + notifyData.description;
        }
        if (notifyData.count > 1) {
          message += ' (x' + notifyData.count + ')';
        }
        
        // Формируем заголовок
        const title = notifySource || 'Системное уведомление';
        
        // Опции для уведомления
        const options = {
          groupKey: notifySource ? notifySource + ':' + notifyData.name : null,
          sound: level === 'error' || level === 'warning',
          persistent: level === 'error',
          actions: []
        };
        
        // Добавляем действие для открытия источника, если указан
        if (notifySource) {
          options.actions.push({
            id: 'view_source',
            label: 'Open',
            callback: (notifId, actionId) => {
              window.open(`/admin/${notifySource}`, '_blank');
            }
          });
        }
        
        showNotification({
          level: level,
          message: message,
          title: title
        }, options);
      }
      
      // Функция для обновления с retry, если система еще не загружена
      function tryUpdateNotifications() {
        if (typeof NotificationSystem !== 'undefined' && NotificationSystem.isInitialized) {
          NotificationSystem.updateNotificationIndicators();
          
          // Обновляем блок уведомлений с небольшой задержкой для гарантии сохранения в БД
          setTimeout(function() {
            refreshNotifyBlockIfAvailable(notifySource);
          }, 300);
          return true;
        }
        return false;
      }
      
      // Пытаемся обновить сразу, если система загружена
      if (!tryUpdateNotifications()) {
        // Если система еще не загружена, ждем с небольшими интервалами (максимум 2 секунды)
        let retryCount = 0;
        const maxRetries = 10;
        const retryInterval = setInterval(function() {
          retryCount++;
          if (tryUpdateNotifications() || retryCount >= maxRetries) {
            clearInterval(retryInterval);
          }
        }, 200);
      }
    } else if (data.operation === 'read_notify') {
      // Уведомление было прочитано на другой странице или на этой же
      const notifyId = data.data.id;
      const notifySource = data.data.source;
      
      // Используем централизованный менеджер для удаления уведомления
      if (typeof NotificationSystem !== 'undefined' && NotificationSystem.isInitialized) {
        NotificationSystem.removeNotifyFromDOM(notifyId, function() {
          NotificationSystem.checkAndHideNotifyBlock();
        });
        
        // Если элемент не найден, но есть source, обновляем весь блок
        if (!NotificationSystem.findNotifyElement(notifyId).length && notifySource) {
          refreshNotifyBlockIfAvailable(notifySource);
        }
      }
      
      // Обновляем индикаторы уведомлений
      if (typeof NotificationSystem !== 'undefined' && NotificationSystem.isInitialized) {
        NotificationSystem.updateNotificationIndicators();
      }
    } else if (data.operation === 'read_notify_all') {
      // Все уведомления были прочитаны на другой странице
      const notifySource = data.data.source;
      
      // Используем централизованный менеджер
      if (typeof NotificationSystem !== 'undefined' && NotificationSystem.isInitialized) {
        if (NotificationSystem.isOnModulePage(notifySource)) {
          const notifyBlock = $('#notify_block');
          if (notifyBlock.length) {
            const alerts = notifyBlock.find('.alert');
            if (alerts.length > 0) {
              alerts.fadeOut(300, function() {
                $(this).remove();
                NotificationSystem.checkAndHideNotifyBlock();
              });
            } else {
              notifyBlock.fadeOut(300, function() {
                $(this).remove();
              });
            }
          }
        }
      }
      
      // Обновляем индикаторы уведомлений
      if (typeof NotificationSystem !== 'undefined' && NotificationSystem.isInitialized) {
        NotificationSystem.updateNotificationIndicators();
      }
    }
  });

  function subscribe(sendPage) {
    if (sendPage === undefined) {
      sendPage = true;
    }
    socket.emit('subscribeActions', ['say','playsound','notify']);
    var propSet = new Set();

    // id="prop:Some.Property"
    var elements = document.querySelectorAll('[id^="prop:"]');
    elements.forEach(function (element) {
      if (!element || !element.id) return;
      var idWithoutProp = element.id.slice(5); // cut "prop:"
      if (idWithoutProp) propSet.add(idWithoutProp);
    });

    // data-prop-* bindings
    document.querySelectorAll('[data-prop-display]').forEach(function (el) {
      var p = (el.getAttribute('data-prop-display') || '').trim();
      if (p) propSet.add(p);
    });
    document.querySelectorAll('[data-prop-text]').forEach(function (el) {
      var p = (el.getAttribute('data-prop-text') || '').trim();
      if (p) propSet.add(p);
    });
    document.querySelectorAll('[data-prop-value]').forEach(function (el) {
      var p = (el.getAttribute('data-prop-value') || '').trim();
      if (p) propSet.add(p);
    });
    document.querySelectorAll('[data-prop-checked]').forEach(function (el) {
      var p = (el.getAttribute('data-prop-checked') || '').trim();
      if (p) propSet.add(p);
    });

    // data-prop-attr-* bindings (needs DOM scan, cache it)
    rebuildPropAttrBindings();
    __propAttrBindings.forEach(function (b) {
      if (b && b.propertyName) propSet.add(b.propertyName);
    });

    var propList = Array.from(propSet);
    console.log(propList);
    elements = document.querySelectorAll('[id^="obj:"]');
    var objectSet = new Set();
    elements.forEach(function (element) {
      var idWithoutProp = element.id.slice(4); // cut "obj:"
      if (idWithoutProp) objectSet.add(idWithoutProp);
    });
    var objectList = Array.from(objectSet);
    console.log(objectList);

    // Keep property subscriptions synchronized with current DOM.
    var propsToSubscribe = [];
    var propsToUnsubscribe = [];
    propList.forEach(function(prop) {
      if (!__subscribedProperties.has(prop)) {
        propsToSubscribe.push(prop);
      }
    });
    __subscribedProperties.forEach(function(prop) {
      if (!propSet.has(prop)) {
        propsToUnsubscribe.push(prop);
      }
    });
    if (propsToUnsubscribe.length > 0) {
      socket.emit('unsubscribeProperties', propsToUnsubscribe);
      propsToUnsubscribe.forEach(function(prop) { __subscribedProperties.delete(prop); });
    }
    if (propsToSubscribe.length > 0) {
      socket.emit('subscribeProperties', propsToSubscribe);
      propsToSubscribe.forEach(function(prop) { __subscribedProperties.add(prop); });
    }

    // Keep object subscriptions synchronized with current DOM.
    var objectsToSubscribe = [];
    var objectsToUnsubscribe = [];
    objectList.forEach(function(objectName) {
      if (!__subscribedObjects.has(objectName)) {
        objectsToSubscribe.push(objectName);
      }
    });
    __subscribedObjects.forEach(function(objectName) {
      if (!objectSet.has(objectName)) {
        objectsToUnsubscribe.push(objectName);
      }
    });
    if (objectsToUnsubscribe.length > 0) {
      socket.emit('unsubscribeObjects', objectsToUnsubscribe);
      objectsToUnsubscribe.forEach(function(objectName) { __subscribedObjects.delete(objectName); });
    }
    if (objectsToSubscribe.length > 0) {
      socket.emit('subscribeObjects', objectsToSubscribe);
      objectsToSubscribe.forEach(function(objectName) { __subscribedObjects.add(objectName); });
    }

    // Отправляем текущую страницу после подписки
    if (sendPage) {
      sendCurrentPage();
    }
  }

  function setupSubscriptionObserver() {
    if (!window.MutationObserver || !document.body) return;
    var observer = new MutationObserver(function() {
      scheduleSubscriptionRefresh();
    });
    observer.observe(document.body, {
      childList: true,
      subtree: true,
      attributes: true,
      attributeFilter: ['id', 'data-prop-display', 'data-prop-text', 'data-prop-value', 'data-prop-checked']
    });
  }

  // Bootstrap modal fix for pages with stacking contexts (e.g. /admin/Objects):
  // If a modal is placed inside a transformed/stacked container, it can flicker or appear under backdrop.
  // We "portal" any shown modal to <body>, and restore it back on hidden.
  function setupModalPortal() {
    if (typeof bootstrap === 'undefined') return;

    // Use capture to run before other handlers
    document.addEventListener('show.bs.modal', function (ev) {
      var modalEl = ev.target;
      if (!modalEl || !modalEl.classList || !modalEl.classList.contains('modal')) return;

      // Already in body => nothing to do
      if (modalEl.parentElement === document.body) return;

      // Create placeholder where the modal lived
      var placeholder = document.createElement('div');
      placeholder.setAttribute('data-modal-portal-placeholder', modalEl.id || '');

      // Store placeholder reference via a unique attribute
      var portalKey = 'modal_portal_' + (modalEl.id || Math.random().toString(36).slice(2));
      placeholder.setAttribute('data-modal-portal-key', portalKey);
      modalEl.setAttribute('data-modal-portal-key', portalKey);

      if (modalEl.parentNode) {
        modalEl.parentNode.insertBefore(placeholder, modalEl);
        modalEl.parentNode.removeChild(modalEl);
      }

      document.body.appendChild(modalEl);
    }, true);

    document.addEventListener('hidden.bs.modal', function (ev) {
      var modalEl = ev.target;
      if (!modalEl || !modalEl.classList || !modalEl.classList.contains('modal')) return;

      var portalKey = modalEl.getAttribute('data-modal-portal-key');
      if (!portalKey) return;

      var placeholder = document.querySelector('[data-modal-portal-key="' + portalKey + '"][data-modal-portal-placeholder]');
      if (placeholder && placeholder.parentNode) {
        placeholder.parentNode.insertBefore(modalEl, placeholder);
        placeholder.parentNode.removeChild(placeholder);
      }

      modalEl.removeAttribute('data-modal-portal-key');
    }, true);
  }

  document.addEventListener('DOMContentLoaded', function () {
    setupModalPortal();
    setupSubscriptionObserver();
    subscribe();

    // На случай SPA/изменения истории обновляем страницу клиента
    window.addEventListener('popstate', sendCurrentPage);
    window.addEventListener('hashchange', sendCurrentPage);
  });
</script>
