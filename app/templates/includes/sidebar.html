<!-- [ navigation menu ] start -->
<div class="offcanvas-lg offcanvas-start sidebar-resizable" tabindex="-1" id="appSidebar" aria-labelledby="appSidebarLabel">
    <div class="offcanvas-header d-lg-none border-bottom py-2">
        <h5 class="offcanvas-title" id="appSidebarLabel">{{ _('Control panel') }}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" data-bs-target="#appSidebar" aria-label="{{ _('Close') }}"></button>
    </div>
    <div class="offcanvas-body p-0">
        <nav class="sidebar p-0">
            {% for key,group in sidebar().items() %}
            <div class="card mb-1 ms-2 me-1">
                <div class="card-header d-flex justify-content-between align-items-center py-1" data-bs-toggle="collapse" data-bs-target="#collapse{{ key }}" aria-expanded="true" aria-controls="collapse{{ key }}">
                    <i class="fas fa-cogs flex-shrink-0"></i>
                    <div class="ps-3 text-truncate flex-grow-1 min-w-0">
                        {{ key }}
                    </div>
                    <i class="fas fa-chevron-down collapse-indicator ms-2 flex-shrink-0" style="transition: transform 0.3s ease;"></i>
                </div>
                <div class="collapse" id="collapse{{ key }}">
                    <div class="card-body px-0 py-0">
                        <div class="list-group list-group-flush">
                            {% for item in group %}
                            <a href="{{ item.route }}" class="list-group-item list-group-item-action{% if item.route in request.path %} list-group-item-primary {% endif %} d-flex justify-content-between align-items-start sidebar-module-link" data-module-name="{{ item.name }}">
                                <img class="flex-shrink-0" src="/{{item.name}}/static/{{item.name}}.png" height="24" alt="" onError="this.src='{{ config.ASSETS_ROOT }}/images/module.png'">
                                <div class="ms-2 me-auto sidebar-item-title text-truncate">
                                    {{ item.title }}
                                </div>
                                {%if item.notify%}
                                <span class="badge bg-warning text-black rounded-pill mt-1 flex-shrink-0" data-notify-count="{{ item.notify }}">{{item.notify}}</span>
                                {%else%}
                                <span class="badge bg-warning text-black rounded-pill mt-1 flex-shrink-0" data-notify-count="0" style="display: none;"></span>
                                {%endif%}
                            </a>
                            {%endfor%}
                        </div>
                    </div>
                </div>
            </div>
            {%endfor%}
        </nav>
    </div>
    <div class="sidebar-resizer d-none d-lg-block" id="appSidebarResizer" aria-hidden="true"></div>
</div>
<script>
    var ADMIN_SIDEBAR_LG = 992;

    function isSidebarDesktop() {
      return window.innerWidth >= ADMIN_SIDEBAR_LG;
    }

    function getSidebarContainer() {
      return document.getElementById('appSidebar');
    }

    function getSidebarWidthLimits() {
      return {
        min: 220,
        max: Math.min(640, Math.floor(window.innerWidth * 0.8))
      };
    }

    function resetSidebarMobileWidth() {
      var container = getSidebarContainer();
      if (container) {
        container.style.width = '';
      }
    }

    function applySidebarWidth(width) {
      var container = getSidebarContainer();
      if (!container || !isSidebarDesktop()) {
        return;
      }

      var limits = getSidebarWidthLimits();
      var safeWidth = Math.min(Math.max(width, limits.min), limits.max);
      container.style.width = safeWidth + 'px';
    }

    function loadSidebarWidth() {
      if (!isSidebarDesktop()) {
        resetSidebarMobileWidth();
        return;
      }

      try {
        var savedWidth = localStorage.getItem('sidebarWidth');
        applySidebarWidth(savedWidth ? parseInt(savedWidth, 10) : 320);
      } catch (e) {
        applySidebarWidth(320);
      }
    }

    function initSidebarResizer() {
      var container = getSidebarContainer();
      var resizer = document.getElementById('appSidebarResizer');
      if (!container || !resizer) {
        return;
      }

      var isResizing = false;
      var startX = 0;
      var startWidth = 0;

      function handleMouseMove(e) {
        if (!isResizing) {
          return;
        }

        e.preventDefault();
        var newWidth = startWidth + (e.clientX - startX);
        applySidebarWidth(newWidth);
      }

      function handleMouseUp() {
        if (!isResizing) {
          return;
        }

        isResizing = false;
        resizer.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';

        try {
          localStorage.setItem('sidebarWidth', parseInt(container.offsetWidth, 10));
        } catch (e) {}

        document.removeEventListener('mousemove', handleMouseMove);
        document.removeEventListener('mouseup', handleMouseUp);
      }

      resizer.addEventListener('mousedown', function(e) {
        if (!isSidebarDesktop()) {
          return;
        }

        e.preventDefault();
        isResizing = true;
        startX = e.clientX;
        startWidth = container.offsetWidth;
        resizer.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';

        document.addEventListener('mousemove', handleMouseMove, { passive: false });
        document.addEventListener('mouseup', handleMouseUp);
      });

      window.addEventListener('resize', function() {
        if (isSidebarDesktop()) {
          loadSidebarWidth();
        } else {
          resetSidebarMobileWidth();
        }
      });
    }

    function initSidebarOffcanvasNav() {
      var container = getSidebarContainer();
      if (!container || typeof bootstrap === 'undefined') {
        return;
      }

      container.querySelectorAll('.sidebar-module-link').forEach(function(link) {
        link.addEventListener('click', function() {
          if (!isSidebarDesktop()) {
            var instance = bootstrap.Offcanvas.getInstance(container);
            if (instance) {
              instance.hide();
            }
          }
        });
      });
    }

    function updateCollapseIndicators() {
      $('[id^="collapse"]').each(function() {
        var collapseElement = $(this);
        var header = collapseElement.prev('.card-header');
        var indicator = header.find('.collapse-indicator');
        if (collapseElement.hasClass('show')) {
          indicator.css('transform', 'rotate(180deg)');
        } else {
          indicator.css('transform', 'rotate(0deg)');
        }
      });
    }

    function loadConfSidebar() {
      if (typeof(Storage) !== "undefined") {
        if (localStorage.getItem('collapseSidebar')) {
          var collapseState = JSON.parse(localStorage.getItem('collapseSidebar'));
          collapseState.forEach(function(item) {
            var element = $('#' + item.id);
            if (!item.collapsed) {
              element.addClass('show');
            } else {
              element.removeClass('show');
            }
          });
        } else {
          var collapseState = [];
          $('[id^="collapse"]').each(function() {
            collapseState.push({id: $(this).attr('id'), collapsed: !$(this).hasClass('show')});
          });
          localStorage.setItem('collapseSidebar', JSON.stringify(collapseState));
        }

        updateCollapseIndicators();

        $('[id^="collapse"]').on('show.bs.collapse', function () {
          var header = $(this).prev('.card-header');
          header.find('.collapse-indicator').css('transform', 'rotate(180deg)');
        });

        $('[id^="collapse"]').on('hide.bs.collapse', function () {
          var header = $(this).prev('.card-header');
          header.find('.collapse-indicator').css('transform', 'rotate(0deg)');
        });

        $('[data-bs-toggle="collapse"]').on('click', function () {
          setTimeout(function() {
            var collapseState = [];
            $('[id^="collapse"]').each(function() {
              collapseState.push({id: $(this).attr('id'), collapsed: !$(this).hasClass('show')});
            });
            localStorage.setItem('collapseSidebar', JSON.stringify(collapseState));
          }, 350);
        });
      }
    }

    $(document).ready(function() {
      loadConfSidebar();
      loadSidebarWidth();
      initSidebarResizer();
      initSidebarOffcanvasNav();
    });
</script>
<!-- [ navigation menu ] end -->
