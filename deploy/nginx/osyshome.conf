# osysHome — reverse proxy (HTTPS)
#
# Install:
#   sudo cp deploy/nginx/osyshome.conf /etc/nginx/sites-available/osyshome.conf
#   sudo ln -sf /etc/nginx/sites-available/osyshome.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace:
#   home.example.com  — your public hostname
#   127.0.0.1:5000  — osysHome bind address (config.yaml application.app_port)

upstream osyshome_backend {
    server 127.0.0.1:5000;
    keepalive 16;
}

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name home.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name home.example.com;

    # Let's Encrypt (certbot certonly --webroot -w /var/www/certbot -d home.example.com)
    ssl_certificate     /etc/letsencrypt/live/home.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/home.example.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Uploads / imports (adjust if needed)
    client_max_body_size 50m;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Optional: basic rate limit for login brute-force (uncomment)
    # limit_req_zone $binary_remote_addr zone=osyshome_login:10m rate=10r/m;
    # location = /login {
    #     limit_req zone=osyshome_login burst=5 nodelay;
    #     proxy_pass http://osyshome_backend;
    #     include /etc/nginx/snippets/osyshome-proxy.conf;
    # }

    location /socket.io/ {
        proxy_pass http://osyshome_backend/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://osyshome_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
